openapi: 3.0.3
info:
  title: Reporting API
  version: 1.0.0
  description: Read-only service. Exposes reports built from all system events.

paths:
  /reports/blocked:
    get:
      summary: Get blocked production orders
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BlockedOrderResponse'

  /reports/history:
    get:
      summary: Get full order history
      parameters:
        - name: fromDay
          in: query
          required: false
          schema:
            type: integer
        - name: toDay
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderHistoryResponse'

  /reports/stats:
    get:
      summary: Get system statistics
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatsResponse'

  /reports/events:
    get:
      summary: Get full event log
      parameters:
        - name: service
          in: query
          required: false
          schema:
            type: string
            enum: [time, transport, production, warehouse]
        - name: fromDay
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventLogResponse'

components:
  schemas:
    BlockedOrderResponse:
      type: object
      properties:
        orderId:
          type: string
          format: uuid
        factoryId:
          type: string
          format: uuid
        reason:
          type: string
        blockedSinceDay:
          type: integer

    OrderHistoryResponse:
      type: object
      properties:
        orderId:
          type: string
          format: uuid
        factoryId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED, BLOCKED]
        createdAtDay:
          type: integer
        completedAtDay:
          type: integer
          nullable: true

    SystemStatsResponse:
      type: object
      properties:
        currentSimulationDay:
          type: integer
        totalOrders:
          type: integer
        completedOrders:
          type: integer
        blockedOrders:
          type: integer
        trucksInTransit:
          type: integer

    EventLogResponse:
      type: object
      properties:
        eventLogId:
          type: string
          format: uuid
        eventType:
          type: string
        sourceService:
          type: string
        simulationDay:
          type: integer
        occurredAt:
          type: string
          format: date-time
        payload:
          type: object
