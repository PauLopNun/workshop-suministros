openapi: 3.0.3
info:
  title: Production API
  version: 1.0.0
  description: Manages factories, recipes, production orders and store orders.

paths:
  /factories:
    get:
      summary: List all factories
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FactoryResponse'
    post:
      summary: Register a factory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFactoryRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FactoryResponse'

  /recipes:
    get:
      summary: List all recipes
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RecipeResponse'
    post:
      summary: Create a recipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecipeRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeResponse'

  /stores:
    get:
      summary: List all stores
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StoreResponse'
    post:
      summary: Register a store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStoreRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreResponse'

  /stores/{storeId}/orders:
    post:
      summary: Place an order from a store
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceOrderRequest'
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlaceOrderResponse'

components:
  schemas:
    Location:
      type: object
      required: [x, y]
      properties:
        x:
          type: integer
          minimum: 0
        y:
          type: integer
          minimum: 0

    Ingredient:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1

    CreateFactoryRequest:
      type: object
      required: [name, location, warehouseId]
      properties:
        name:
          type: string
          example: Furniture Factory
        location:
          $ref: '#/components/schemas/Location'
        warehouseId:
          type: string
          format: uuid

    FactoryResponse:
      type: object
      properties:
        factoryId:
          type: string
          format: uuid
        name:
          type: string
        location:
          $ref: '#/components/schemas/Location'
        warehouseId:
          type: string
          format: uuid
        assignedRecipes:
          type: array
          items:
            type: string
            format: uuid

    CreateRecipeRequest:
      type: object
      required: [name, inputs, outputProductId, buildTimeInDays]
      properties:
        name:
          type: string
          example: Table recipe
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/Ingredient'
        outputProductId:
          type: string
          format: uuid
        buildTimeInDays:
          type: integer
          minimum: 1

    RecipeResponse:
      type: object
      properties:
        recipeId:
          type: string
          format: uuid
        name:
          type: string
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/Ingredient'
        outputProductId:
          type: string
          format: uuid
        buildTimeInDays:
          type: integer

    CreateStoreRequest:
      type: object
      required: [name, location, warehouseId]
      properties:
        name:
          type: string
          example: North Furniture Store
        location:
          $ref: '#/components/schemas/Location'
        warehouseId:
          type: string
          format: uuid

    StoreResponse:
      type: object
      properties:
        storeId:
          type: string
          format: uuid
        name:
          type: string
        location:
          $ref: '#/components/schemas/Location'
        warehouseId:
          type: string
          format: uuid

    PlaceOrderRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1

    PlaceOrderResponse:
      type: object
      properties:
        storeOrderId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, IN_PRODUCTION, SHIPPED, COMPLETED]
