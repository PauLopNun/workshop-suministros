openapi: 3.0.3
info:
  title: Transport API
  version: 1.0.0
  description: Manages the truck fleet and deliveries between warehouses.

paths:
  /trucks:
    get:
      summary: List all trucks
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TruckResponse'
    post:
      summary: Register a new truck
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTruckRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TruckResponse'

  /trucks/{truckId}:
    get:
      summary: Get truck by id
      parameters:
        - name: truckId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TruckResponse'
        '404':
          description: Truck not found

  /deliveries:
    get:
      summary: List deliveries in transit
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeliveryResponse'

components:
  schemas:
    Location:
      type: object
      required: [x, y]
      properties:
        x:
          type: integer
          minimum: 0
        y:
          type: integer
          minimum: 0

    CreateTruckRequest:
      type: object
      required: [name, location, speed, capacity]
      properties:
        name:
          type: string
          example: Truck-01
        location:
          $ref: '#/components/schemas/Location'
        speed:
          type: integer
          minimum: 1
          example: 2
        capacity:
          type: integer
          minimum: 1
          example: 100

    TruckResponse:
      type: object
      properties:
        truckId:
          type: string
          format: uuid
        name:
          type: string
        location:
          $ref: '#/components/schemas/Location'
        status:
          type: string
          enum: [IDLE, IN_TRANSIT]
        speed:
          type: integer
        capacity:
          type: integer
        currentDeliveryId:
          type: string
          format: uuid
          nullable: true

    DeliveryResponse:
      type: object
      properties:
        deliveryId:
          type: string
          format: uuid
        truckId:
          type: string
          format: uuid
        shipmentId:
          type: string
          format: uuid
        origin:
          $ref: '#/components/schemas/Location'
        destination:
          $ref: '#/components/schemas/Location'
        totalDays:
          type: integer
        remainingDays:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/DeliveryItem'

    DeliveryItem:
      type: object
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
